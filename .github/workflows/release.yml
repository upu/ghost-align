name: Release
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      # A release is identified by package.json's version, not a manually pushed
      # tag: `gh release create` below creates the tag as a side effect. If a
      # release for the current version already exists, this push is an
      # ordinary merge (or a Re-run after a fully-succeeded release) — every
      # later step is skipped so nothing is recreated.
      - name: Resolve version and check for an existing release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify VSCE_PAT
        if: steps.version.outputs.exists == 'false' && env.VSCE_PAT != ''
        run: npx @vscode/vsce verify-pat -p "$VSCE_PAT"
      - name: Compile
        if: steps.version.outputs.exists == 'false'
        run: npm run compile
      - name: Package VSIX
        if: steps.version.outputs.exists == 'false'
        run: npm run package
      - name: Extract release notes from CHANGELOG
        if: steps.version.outputs.exists == 'false'
        run: |
          awk -v ver="${{ steps.version.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${{ steps.version.outputs.tag }}" > RELEASE_NOTES.md
          fi
      - name: Create GitHub Release with VSIX
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" dist/ghost-align.vsix --title "${{ steps.version.outputs.tag }}" --notes-file RELEASE_NOTES.md
      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.exists == 'false' && env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath dist/ghost-align.vsix -p "$VSCE_PAT"
      - name: Close milestone
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MILESTONE=$(gh api --method GET "repos/${{ github.repository }}/milestones" -f state=all --jq \
            ".[] | select(.title == \"$TAG\")")
          if [ -z "$MILESTONE" ]; then
            echo "No milestone titled $TAG; skipping."
            exit 0
          fi
          NUMBER=$(echo "$MILESTONE" | jq -r '.number')
          OPEN_ISSUES=$(echo "$MILESTONE" | jq -r '.open_issues')
          if [ "$OPEN_ISSUES" -gt 0 ]; then
            echo "::warning::Milestone $TAG has $OPEN_ISSUES open issue(s); not closing."
            exit 0
          fi
          gh api --method PATCH "repos/${{ github.repository }}/milestones/$NUMBER" -f state=closed
          echo "Closed milestone $TAG"
