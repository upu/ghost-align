name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run test:prepare-release
      - run: npm test
      - run: npm run check:package
